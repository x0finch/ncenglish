# Build @nce/app and deploy dist/ to GitHub Pages (project site: /<repo>/).
# Prerequisite: Repo Settings → Pages → Source = "GitHub Actions" (or deploy-pages returns 404).
#
# Custom domain on a *project* site is served at the domain root (/), not /<repo>/.
# Default base is "/" so https://your-domain/ works without extra repo configuration.
# To use the default GitHub URL https://USER.github.io/REPO/ instead, set repository variable
# VITE_BASE_PATH to "/REPO/" (match repo name, trailing slash). Settings → Secrets and variables → Actions → Variables.
#
# Media URLs (public R2/CDN origin, no trailing slash), required for playback:
# - Repository secret: Settings → Secrets and variables → Actions → Secrets, OR
# - Environment secret on "github-pages": the build job must use that environment (see below).
name: Deploy app to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Needed so VITE_NCE_MEDIA_BASE_URL from the github-pages *environment* secrets is in `secrets.*`.
    environment: github-pages
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Require VITE_NCE_MEDIA_BASE_URL secret
        env:
          VITE_NCE_MEDIA_BASE_URL: ${{ secrets.VITE_NCE_MEDIA_BASE_URL }}
        run: |
          if [ -z "$VITE_NCE_MEDIA_BASE_URL" ]; then
            echo "::error::Set Actions secret VITE_NCE_MEDIA_BASE_URL to your public media origin (no trailing slash). See workflow header comment."
            exit 1
          fi
      - name: Build SPA
        env:
          # Default "/": correct for custom domains (site served at domain root).
          # Override with e.g. "/ncenglish/" when testing via USER.github.io/REPO/ only.
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/' }}
          VITE_NCE_MEDIA_BASE_URL: ${{ secrets.VITE_NCE_MEDIA_BASE_URL }}
        run: pnpm --filter @nce/app build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
