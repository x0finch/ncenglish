# Build @nce/app and deploy dist/ to GitHub Pages (project site: /<repo>/).
# Prerequisite: Repo Settings → Pages → Source = "GitHub Actions" (or deploy-pages returns 404).
name: Deploy app to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Build SPA
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          # Optional: set as repository secret if the site should load media from a fixed CDN
          # VITE_NCE_MEDIA_BASE_URL: ${{ secrets.VITE_NCE_MEDIA_BASE_URL }}
        run: pnpm --filter @nce/app build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
